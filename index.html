<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>譜読みトレーニング</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

body{
  font-family:sans-serif;
  text-align:center;
  margin:20px;
  background:#ffffff;
}

h2{
  margin-bottom:20px;
}

button,
select{
  font-size:18px;
  padding:10px 14px;
  margin:5px;
}

canvas{
  border:1px solid #ccc;
  width:95vw;
  max-width:720px;
  height:auto;
  background:white;
}

.controls{
  margin-bottom:20px;
}

#timer{
  font-size:32px;
  font-weight:bold;
  margin:10px;
  color:#cc0000;
}

</style>
</head>

<body>

<h2>ピアノ譜読みトレーニング</h2>

<div class="controls">

<select id="level">
  <option value="5">ド〜ソ</option>
  <option value="8">ド〜高いド</option>
  <option value="8_rhythm">ド〜高いド＋8分音符</option>
</select>

<select id="timeMode">
  <option value="5">5秒モード</option>
  <option value="3">3秒モード</option>
</select>

<br><br>

<button onclick="showAnswer()">答えを見る</button>
<button onclick="startNewQuestion()">次のフレーズ</button>

</div>

<div id="timer"></div>

<canvas id="score"></canvas>

<script>

// ========================================
// Canvas
// ========================================

const canvas = document.getElementById("score");
const ctx = canvas.getContext("2d");

const timerElement = document.getElementById("timer");


// ========================================
// 設定
// ========================================

const CONFIG = {

  canvasHeight: 180,

  staffTop: 60,
  lineGap: 10,

  noteStartX: 110,
  beatWidth: 90,

  answerY: 35,

  stemLength: 30,

  noteHeadWidth: 7,
  noteHeadHeight: 5
};


// ========================================
// 音情報
// ========================================

const NOTE_DATA = [

  { name:"ド", y:110 },
  { name:"レ", y:105 },
  { name:"ミ", y:100 },
  { name:"ファ", y:95 },
  { name:"ソ", y:90 },
  { name:"ラ", y:85 },
  { name:"シ", y:80 },
  { name:"ド", y:75 }
];

let currentNotes = [];

let timerInterval = null;

let hiddenMode = false;


// ========================================
// リサイズ
// ========================================

function resizeCanvas(){

  const rect = canvas.getBoundingClientRect();

  canvas.width = rect.width;
  canvas.height = CONFIG.canvasHeight;
}


// ========================================
// 五線譜
// ========================================

function drawStaff(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawStaffLines();
  drawTrebleClef();
  drawTimeSignature();
}

function drawStaffLines(){

  for(let i=0;i<5;i++){

    const y = CONFIG.staffTop + i * CONFIG.lineGap;

    ctx.beginPath();
    ctx.moveTo(40,y);
    ctx.lineTo(canvas.width - 20,y);
    ctx.stroke();
  }
}

function drawTrebleClef(){

  ctx.font = "52px serif";
  ctx.fillText("𝄞", 15, 102);
}

function drawTimeSignature(){

  ctx.font = "bold 22px sans-serif";

  ctx.fillText("4", 62, 75);
  ctx.fillText("4", 62, 95);
}

function drawBarLine(x){

  ctx.beginPath();

  ctx.moveTo(x,60);
  ctx.lineTo(x,100);

  ctx.stroke();
}


// ========================================
// 音符
// ========================================

function drawNoteHead(x,y){

  ctx.save();

  ctx.translate(x,y);

  ctx.rotate(-0.3);

  ctx.beginPath();

  ctx.ellipse(
    0,
    0,
    CONFIG.noteHeadWidth,
    CONFIG.noteHeadHeight,
    0,
    0,
    Math.PI * 2
  );

  ctx.fill();

  ctx.restore();
}


function isStemUp(pos){

  return pos <= 4;
}


function drawStem(x,y,pos){

  ctx.beginPath();

  if(isStemUp(pos)){

    ctx.moveTo(x + 6, y);
    ctx.lineTo(x + 6, y - CONFIG.stemLength);

  }else{

    ctx.moveTo(x - 6, y);
    ctx.lineTo(x - 6, y + CONFIG.stemLength);
  }

  ctx.stroke();
}


function drawLedgerLine(x,pos){

  if(pos !== 0) return;

  const y = NOTE_DATA[pos].y;

  ctx.beginPath();

  ctx.moveTo(x - 10,y);
  ctx.lineTo(x + 10,y);

  ctx.stroke();
}


function drawQuarterNote(note){

  const y = NOTE_DATA[note.pos].y;

  drawLedgerLine(note.x, note.pos);

  drawNoteHead(note.x,y);

  drawStem(note.x,y,note.pos);
}


function drawEighthPair(note1,note2){

  const y1 = NOTE_DATA[note1.pos].y;
  const y2 = NOTE_DATA[note2.pos].y;

  drawLedgerLine(note1.x,note1.pos);
  drawLedgerLine(note2.x,note2.pos);

  drawNoteHead(note1.x,y1);
  drawNoteHead(note2.x,y2);

  const stemTop1 = y1 - CONFIG.stemLength;
  const stemTop2 = y2 - CONFIG.stemLength;

  ctx.beginPath();

  ctx.moveTo(note1.x + 6, y1);
  ctx.lineTo(note1.x + 6, stemTop1);

  ctx.moveTo(note2.x + 6, y2);
  ctx.lineTo(note2.x + 6, stemTop2);

  ctx.stroke();

  ctx.beginPath();

  ctx.lineWidth = 4;

  ctx.moveTo(note1.x + 6, stemTop1);
  ctx.lineTo(note2.x + 6, stemTop2);

  ctx.stroke();

  ctx.lineWidth = 1;
}


// ========================================
// 描画
// ========================================

function drawAllNotes(notes){

  for(let i=0;i<notes.length;i++){

    const note = notes[i];
    const next = notes[i+1];

    if(
      note.type === "eighth" &&
      next &&
      next.type === "eighth"
    ){

      drawEighthPair(note,next);

      i++;

    }else{

      drawQuarterNote(note);
    }
  }
}


// ========================================
// 音楽っぽい音生成
// ========================================

function generatePitchSequence(length,max){

  const sequence = [];

  let current = Math.floor(Math.random() * max);

  sequence.push(current);

  let previousJump = 0;

  for(let i=1;i<length;i++){

    if(i === length - 1){

      const endRand = Math.random();

      if(endRand < 0.5){

        current = 0;

      }else if(endRand < 0.7){

        current = 4;

      }else if(endRand < 0.85){

        current = 2;

      }else{

        current = Math.floor(Math.random() * max);
      }

      sequence.push(current);

      break;
    }

    if(current === 6 && Math.random() < 0.7){

      current = 7;

      sequence.push(current);

      continue;
    }

    if(previousJump !== 0){

      current -= previousJump;

      previousJump = 0;

    }else{

      const r = Math.random();

      if(r < 0.7){

        current += Math.random() < 0.5 ? -1 : 1;

      }else if(r < 0.9){

      }else{

        const jump = Math.random() < 0.5 ? -2 : 2;

        current += jump;

        previousJump = jump;
      }
    }

    if(current < 0){
      current = 0;
    }

    if(current >= max){
      current = max - 1;
    }

    sequence.push(current);
  }

  return sequence;
}


// ========================================
// リズム生成
// ========================================

function generateRhythm(){

  const rhythm = [];

  for(let i=0;i<4;i++){

    if(Math.random() < 0.4){

      rhythm.push("eighth");
      rhythm.push("eighth");

    }else{

      rhythm.push("quarter");
    }
  }

  return rhythm;
}


// ========================================
// ノート生成
// ========================================

function createNotes(level){

  const notes = [];

  let x = CONFIG.noteStartX;

  if(level === "8_rhythm"){

    const rhythm = generateRhythm();

    const pitches = generatePitchSequence(rhythm.length,8);

    for(let i=0;i<rhythm.length;i++){

      if(
        rhythm[i] === "eighth" &&
        rhythm[i+1] === "eighth"
      ){

        notes.push({
          pos:pitches[i],
          x:x,
          type:"eighth"
        });

        notes.push({
          pos:pitches[i+1],
          x:x + CONFIG.beatWidth / 2,
          type:"eighth"
        });

        i++;

      }else{

        notes.push({
          pos:pitches[i],
          x:x,
          type:"quarter"
        });
      }

      x += CONFIG.beatWidth;
    }

  }else{

    const max = parseInt(level);

    const pitches = generatePitchSequence(4,max);

    for(let i=0;i<4;i++){

      notes.push({
        pos:pitches[i],
        x:CONFIG.noteStartX + i * CONFIG.beatWidth,
        type:"quarter"
      });
    }
  }

  return notes;
}


// ========================================
// 問題表示
// ========================================

function drawQuestion(){

  drawStaff();

  drawAllNotes(currentNotes);

  drawBarLine(CONFIG.noteStartX + CONFIG.beatWidth * 4 - 15);
}


// ========================================
// 問題を隠す
// ========================================

function hideQuestion(){

  hiddenMode = true;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  timerElement.textContent = "時間切れ！";
}


// ========================================
// 答え表示
// ========================================

function showAnswer(){

  drawQuestion();

  ctx.font = "bold 14px sans-serif";

  ctx.fillStyle = "blue";

  ctx.textAlign = "center";

  for(const note of currentNotes){

    ctx.fillText(
      NOTE_DATA[note.pos].name,
      note.x,
      CONFIG.answerY
    );
  }
}


// ========================================
// タイマー
// ========================================

function startTimer(){

  clearInterval(timerInterval);

  let timeLeft = parseInt(
    document.getElementById("timeMode").value
  );

  timerElement.textContent = timeLeft;

  timerInterval = setInterval(() => {

    timeLeft--;

    timerElement.textContent = timeLeft;

    if(timeLeft <= 0){

      clearInterval(timerInterval);

      hideQuestion();
    }

  },1000);
}


// ========================================
// 新問題
// ========================================

function startNewQuestion(){

  hiddenMode = false;

  resizeCanvas();

  const level = document.getElementById("level").value;

  currentNotes = createNotes(level);

  drawQuestion();

  startTimer();
}


// ========================================
// 初期化
// ========================================

startNewQuestion();

window.addEventListener("resize", () => {

  if(!hiddenMode){

    drawQuestion();
  }
});


// ========================================
// PWA
// ========================================

if("serviceWorker" in navigator){

  navigator.serviceWorker
    .register("sw.js")
    .then(() => console.log("Service Worker 登録成功"))
    .catch(err => console.log("SW失敗:", err));
}

</script>

</body>
</html>
