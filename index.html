<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>譜読みトレーニング</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

body{
  font-family:sans-serif;
  text-align:center;
  margin-top:20px;
}

button,
select{
  font-size:18px;
  padding:8px 12px;
  margin:5px;
}

canvas{
  border:1px solid #ccc;
  width:90vw;
  max-width:700px;
  height:auto;
}

</style>
</head>

<body>

<h2>ピアノ譜読みトレーニング</h2>

<select id="level">
  <option value="5">ド〜ソ</option>
  <option value="8">ド〜高いド</option>
  <option value="8_rhythm">ド〜高いド＋8分音符</option>
</select>

<br><br>

<canvas id="score"></canvas>

<br><br>

<button onclick="showAnswer()">答えを見る</button>
<button onclick="generatePhrase()">次のフレーズ</button>

<script>

// ========================================
// 基本設定
// ========================================

const canvas = document.getElementById("score");
const ctx = canvas.getContext("2d");

const CONFIG = {

  canvasHeight: 170,

  staffTop: 60,
  lineGap: 10,
  staffLines: 5,

  noteStartX: 90,
  beatWidth: 75,

  answerY: 40,

  noteHeadWidth: 6,
  noteHeadHeight: 5,

  stemLength: 30
};

const NOTE_DATA = [

  { name:"ド", y:110 },
  { name:"レ", y:105 },
  { name:"ミ", y:100 },
  { name:"ファ", y:95 },
  { name:"ソ", y:90 },
  { name:"ラ", y:85 },
  { name:"シ", y:80 },
  { name:"ド", y:75 }
];

let currentNotes = [];


// ========================================
// Canvasサイズ
// ========================================

function resizeCanvas(){

  const rect = canvas.getBoundingClientRect();

  canvas.width = rect.width;
  canvas.height = CONFIG.canvasHeight;
}


// ========================================
// 五線譜
// ========================================

function drawStaff(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawStaffLines();
  drawTrebleClef();
  drawTimeSignature();
}

function drawStaffLines(){

  for(let i=0;i<CONFIG.staffLines;i++){

    const y = CONFIG.staffTop + i * CONFIG.lineGap;

    ctx.beginPath();
    ctx.moveTo(40,y);
    ctx.lineTo(canvas.width-20,y);
    ctx.stroke();
  }
}

function drawTrebleClef(){

  ctx.font = "50px serif";
  ctx.fillText("𝄞", 10, 105);
}

function drawTimeSignature(){

  ctx.font = "bold 22px sans-serif";

  ctx.fillText("4", 55, 75);
  ctx.fillText("4", 55, 95);
}

function drawBarLine(x){

  ctx.beginPath();
  ctx.moveTo(x,60);
  ctx.lineTo(x,100);
  ctx.stroke();
}


// ========================================
// 音符描画
// ========================================

function drawNote(note){

  drawLedgerLine(note);
  drawNoteHead(note);

  if(note.type === "eighth" && note.beamed){
    return;
  }

  drawStem(note);

  if(note.type === "eighth"){
    drawFlag(note);
  }
}

function drawLedgerLine(note){

  if(note.pos !== 0) return;

  const y = NOTE_DATA[note.pos].y;

  ctx.beginPath();
  ctx.moveTo(note.x-10, y);
  ctx.lineTo(note.x+10, y);
  ctx.stroke();
}

function drawNoteHead(note){

  const y = NOTE_DATA[note.pos].y;

  ctx.save();

  ctx.translate(note.x, y);
  ctx.rotate(-0.3);

  ctx.beginPath();

  ctx.ellipse(
    0,
    0,
    CONFIG.noteHeadWidth,
    CONFIG.noteHeadHeight,
    0,
    0,
    Math.PI * 2
  );

  ctx.fill();

  ctx.restore();
}

function isStemUp(note){

  const y = NOTE_DATA[note.pos].y;

  return y > 90;
}

function drawStem(note){

  const y = NOTE_DATA[note.pos].y;

  ctx.beginPath();

  if(isStemUp(note)){

    ctx.moveTo(note.x + 6, y);
    ctx.lineTo(note.x + 6, y - CONFIG.stemLength);

  }else{

    ctx.moveTo(note.x - 6, y);
    ctx.lineTo(note.x - 6, y + CONFIG.stemLength);
  }

  ctx.stroke();
}

function drawFlag(note){

  const y = NOTE_DATA[note.pos].y;

  ctx.beginPath();

  if(isStemUp(note)){

    ctx.moveTo(note.x + 6, y - CONFIG.stemLength);
    ctx.lineTo(note.x + 12, y - 20);

  }else{

    ctx.moveTo(note.x - 6, y + CONFIG.stemLength);
    ctx.lineTo(note.x - 12, y + 20);
  }

  ctx.stroke();
}


// ========================================
// 8分音符ビーム
// ========================================

function drawBeamPair(note1, note2){

  note1.beamed = true;
  note2.beamed = true;

  drawNoteHead(note1);
  drawNoteHead(note2);

  drawLedgerLine(note1);
  drawLedgerLine(note2);

  const y1 = NOTE_DATA[note1.pos].y;
  const y2 = NOTE_DATA[note2.pos].y;

  const stem1 = y1 - CONFIG.stemLength;
  const stem2 = y2 - CONFIG.stemLength;

  ctx.beginPath();

  ctx.moveTo(note1.x + 6, y1);
  ctx.lineTo(note1.x + 6, stem1);

  ctx.moveTo(note2.x + 6, y2);
  ctx.lineTo(note2.x + 6, stem2);

  ctx.stroke();

  ctx.beginPath();

  ctx.moveTo(note1.x + 6, stem1);
  ctx.lineTo(note2.x + 6, stem2);

  ctx.lineWidth = 4;
  ctx.stroke();
  ctx.lineWidth = 1;
}

function drawAllNotes(notes){

  for(let i=0;i<notes.length;i++){

    const note = notes[i];
    const next = notes[i+1];

    if(
      note.type === "eighth" &&
      next &&
      next.type === "eighth"
    ){

      drawBeamPair(note,next);
      i++;

    }else{

      drawNote(note);
    }
  }
}


// ========================================
// 音楽っぽい音生成
// ========================================

function generatePitchSequence(length, max){

  let sequence = [];

  let current = Math.floor(Math.random() * max);

  sequence.push(current);

  let previousJump = 0;

  for(let i=1;i<length;i++){

    if(i === length - 1){

      current = 0;
      sequence.push(current);
      break;
    }

    if(current === 6 && Math.random() < 0.7){

      current = 7;
      sequence.push(current);
      continue;
    }

    if(previousJump !== 0){

      current -= previousJump;
      previousJump = 0;

    }else{

      const r = Math.random();

      if(r < 0.7){

        current += Math.random() < 0.5 ? -1 : 1;

      }else if(r < 0.9){

      }else{

        const jump = Math.random() < 0.5 ? -2 : 2;

        current += jump;
        previousJump = jump;
      }
    }

    if(current < 0) current = 0;
    if(current >= max) current = max - 1;

    sequence.push(current);
  }

  return sequence;
}


// ========================================
// リズム生成
// ========================================

function generateRhythm(){

  const rhythm = [];

  for(let i=0;i<4;i++){

    if(Math.random() < 0.4){

      rhythm.push("eighth", "eighth");

    }else{

      rhythm.push("quarter");
    }
  }

  return rhythm;
}


// ========================================
// フレーズ生成
// ========================================

function createNotes(level){

  const notes = [];

  let x = CONFIG.noteStartX;

  if(level === "8_rhythm"){

    const rhythm = generateRhythm();
    const pitches = generatePitchSequence(rhythm.length, 8);

    for(let i=0;i<rhythm.length;i++){

      const type = rhythm[i];

      if(type === "eighth" && rhythm[i+1] === "eighth"){

        notes.push({
          pos:pitches[i],
          x:x,
          type:"eighth"
        });

        notes.push({
          pos:pitches[i+1],
          x:x + CONFIG.beatWidth / 2,
          type:"eighth"
        });

        i++;

      }else{

        notes.push({
          pos:pitches[i],
          x:x,
          type:"quarter"
        });
      }

      x += CONFIG.beatWidth;
    }

  }else{

    const max = parseInt(level);

    const pitches = generatePitchSequence(4, max);

    for(let i=0;i<4;i++){

      notes.push({
        pos:pitches[i],
        x:CONFIG.noteStartX + i * CONFIG.beatWidth,
        type:"quarter"
      });
    }
  }

  return notes;
}


// ========================================
// 答え表示
// ========================================

function showAnswer(){

  ctx.font = "bold 14px sans-serif";
  ctx.fillStyle = "blue";
  ctx.textAlign = "center";

  for(const note of currentNotes){

    ctx.fillText(
      NOTE_DATA[note.pos].name,
      note.x,
      CONFIG.answerY
    );
  }
}


// ========================================
// メイン処理
// ========================================

function generatePhrase(){

  resizeCanvas();
  drawStaff();

  const level = document.getElementById("level").value;

  currentNotes = createNotes(level);

  drawAllNotes(currentNotes);

  drawBarLine(CONFIG.noteStartX + CONFIG.beatWidth * 4 - 10);
}


// ========================================
// 初期化
// ========================================

generatePhrase();

window.addEventListener("resize", generatePhrase);


// ========================================
// PWA（オフライン対応）
// ========================================

if ('serviceWorker' in navigator) {

  navigator.serviceWorker
    .register('sw.js')
    .then(() => console.log('Service Worker 登録成功'))
    .catch(err => console.log('SW失敗:', err));
}

</script>

</body>
</html>
